<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Cyber Attack Simulation Lab – Secure login portal for cybersecurity training platform"/>
  <title>CASL – Cyber Attack Simulation Lab</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    /* Matrix canvas */
    #matrix-canvas {
      position: fixed; inset: 0; z-index: 0;
      opacity: 0.18;
    }

    /* Radial glow center */
    .login-glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
      z-index: 1;
    }

    /* Grid lines */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Login container */
    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 460px;
      padding: 20px;
      animation: fadeIn 0.6s ease;
    }

    /* Brand header */
    .brand-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      color: #000;
      margin: 0 auto 16px;
      box-shadow: 0 0 40px rgba(0,255,136,0.4), 0 0 80px rgba(0,212,255,0.2);
      animation: glowPulse 3s ease-in-out infinite;
    }
    .brand-name {
      font-size: 1.6rem; font-weight: 800;
      background: linear-gradient(135deg, var(--green), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }
    .brand-tagline {
      font-size: 0.78rem; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 6px; letter-spacing: 1px;
    }

    /* Card */
    .login-card {
      background: rgba(10, 20, 40, 0.9);
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 20px;
      padding: 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 40px rgba(0,255,136,0.05);
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: rgba(0,0,0,0.3);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1; padding: 10px; text-align: center;
      border-radius: 8px;
      font-size: 0.875rem; font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }
    .auth-tab.active {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--border);
    }

    /* Input with icon */
    .input-wrap {
      position: relative;
      margin-bottom: 18px;
    }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 0.9rem; pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-md);
      padding: 13px 16px 13px 42px;
      color: var(--text-primary);
      font-size: 0.9rem;
      transition: var(--transition);
    }
    .input-wrap input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
    }
    .input-wrap input::placeholder { color: var(--text-muted); }

    .eye-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); cursor: pointer; font-size: 0.9rem;
      transition: var(--transition);
    }
    .eye-toggle:hover { color: var(--green); }

    /* Remember / Forgot */
    .form-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; font-size: 0.8rem;
    }
    .checkbox-wrap { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); cursor: pointer; }
    .checkbox-wrap input[type=checkbox] { accent-color: var(--green); width: 14px; height: 14px; }
    .forgot-link { color: var(--green); font-size: 0.8rem; }
    .forgot-link:hover { text-decoration: underline; }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--green), #00d4a0);
      color: #000;
      font-weight: 700;
      font-size: 0.95rem;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 0 20px rgba(0,255,136,0.3);
      letter-spacing: 0.5px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 35px rgba(0,255,136,0.5);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Loading state */
    .btn-login .spinner {
      display: none;
      animation: spin 0.8s linear infinite;
    }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner { display: inline-block; }

    /* Divider */
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--text-muted); font-size: 0.78rem;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    /* Quick-access test accounts */
    .demo-accounts {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-top: 16px;
    }
    .demo-btn {
      padding: 8px 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      transition: var(--transition);
      text-align: left;
    }
    .demo-btn:hover { border-color: var(--border); color: var(--green); background: var(--green-dim); }
    .demo-btn strong { display: block; color: var(--text-primary); font-size: 0.8rem; margin-bottom: 2px; }

    /* Security disclaimer */
    .security-notice {
      margin-top: 24px; padding: 12px 16px;
      background: rgba(255,68,68,0.06);
      border: 1px solid rgba(255,68,68,0.15);
      border-radius: var(--radius-md);
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 0.75rem; color: var(--text-secondary);
    }
    .security-notice i { color: var(--red); margin-top: 2px; flex-shrink: 0; }

    /* Form panel */
    .auth-form { display: none; }
    .auth-form.active { display: block; animation: fadeIn 0.3s ease; }

    /* Bottom status bar */
    .status-bar {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      margin-top: 24px; font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace; color: var(--text-muted);
    }
    .status-bar span { display: flex; align-items: center; gap: 5px; }
    .status-bar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  </style>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <div class="grid-overlay"></div>
  <div class="login-glow"></div>

  <div class="login-wrap">
    <!-- Brand -->
    <div class="brand-header">
      <div class="brand-logo"><i class="fas fa-shield-halved"></i></div>
      <div class="brand-name">CASL</div>
      <div class="brand-tagline">// CYBER ATTACK SIMULATION LAB v2.0</div>
    </div>

    <!-- Card -->
    <div class="login-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">
          <i class="fas fa-right-to-bracket"></i> Login
        </div>
        <div class="auth-tab" id="tab-register" onclick="switchTab('register')">
          <i class="fas fa-user-plus"></i> Register
        </div>
      </div>

      <!-- Login Form -->
      <div class="auth-form active" id="form-login">
        <div class="input-wrap">
          <i class="fas fa-at input-icon"></i>
          <input type="email" id="login-email" placeholder="Email address" autocomplete="email"/>
        </div>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="login-password" placeholder="Password"/>
          <i class="fas fa-eye eye-toggle" id="pw-toggle" onclick="togglePassword('login-password','pw-toggle')"></i>
        </div>
        <div class="form-meta">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember-me"/> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button class="btn-login" id="btn-login" onclick="doLogin()">
          <span class="btn-text"><i class="fas fa-right-to-bracket"></i> &nbsp;Enter Lab</span>
          <i class="fas fa-spinner spinner"></i>
        </button>

        <div class="or-divider">Quick access accounts</div>
        <div class="demo-accounts">
          <button class="demo-btn" onclick="fillDemo('admin@casl.lab','Admin@2024')">
            <strong>Administrator</strong>
            admin@casl.lab
          </button>
          <button class="demo-btn" onclick="fillDemo('analyst@casl.lab','Analyst@2024')">
            <strong>Security Analyst</strong>
            analyst@casl.lab
          </button>
        </div>
      </div>

      <!-- Register Form -->
      <div class="auth-form" id="form-register">
        <div class="input-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="reg-name" placeholder="Full name"/>
        </div>
        <div class="input-wrap">
          <i class="fas fa-at input-icon"></i>
          <input type="email" id="reg-email" placeholder="Email address"/>
        </div>
        <div class="input-wrap">
          <i class="fas fa-building input-icon"></i>
          <input type="text" id="reg-org" placeholder="University / Organization"/>
        </div>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="reg-password" placeholder="Create password"/>
        </div>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="reg-confirm" placeholder="Confirm password"/>
        </div>
        <button class="btn-login" id="btn-register" onclick="doRegister()">
          <span class="btn-text"><i class="fas fa-user-plus"></i> &nbsp;Create Account</span>
          <i class="fas fa-spinner spinner"></i>
        </button>
      </div>

      <!-- Security Notice -->
      <div class="security-notice">
        <i class="fas fa-triangle-exclamation"></i>
        <span>This lab is strictly for <strong>educational and ethical purposes</strong>. All simulations occur in an isolated environment. Unauthorized use is prohibited.</span>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <span><span class="dot"></span> Systems Online</span>
      <span>VirtualBox: Connected</span>
      <span>Wazuh: Active</span>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/app.js"></script>
  <script>
    /* ── Matrix Rain ── */
    (function() {
      const canvas = document.getElementById('matrix-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, cols, drops;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cols  = Math.floor(W / 16);
        drops = Array(cols).fill(1);
      }

      function draw() {
        ctx.fillStyle = 'rgba(2,8,23,0.05)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#00ff88';
        ctx.font = '13px JetBrains Mono, monospace';

        const chars = '01アイウエオカキクケコサシスセソタチツABCDEF0123456789';
        drops.forEach((y, i) => {
          const ch = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillStyle = `rgba(0, ${Math.floor(200 + Math.random()*55)}, ${Math.floor(100 + Math.random()*55)}, ${Math.random()})`;
          ctx.fillText(ch, i * 16, y * 16);
          if (y * 16 > H && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        });
      }

      resize();
      window.addEventListener('resize', resize);
      setInterval(draw, 50);
    })();

    /* ── Tab switch ── */
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('form-' + tab).classList.add('active');
    }

    /* ── Toggle password visibility ── */
    function togglePassword(inputId, iconId) {
      const inp = document.getElementById(inputId);
      const ico = document.getElementById(iconId);
      if (inp.type === 'password') {
        inp.type = 'text';
        ico.className = 'fas fa-eye-slash eye-toggle';
      } else {
        inp.type = 'password';
        ico.className = 'fas fa-eye eye-toggle';
      }
    }

    /* ── Fill demo credentials ── */
    function fillDemo(email, pass) {
      document.getElementById('login-email').value = email;
      document.getElementById('login-password').value = pass;
    }

    /* ── Login ── */
    function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value;
      const btn   = document.getElementById('btn-login');

      if (!email || !pass) { Toast.warning('Missing fields', 'Please enter your email and password'); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      setTimeout(() => {
        const users = {
          'admin@casl.lab':   { name: 'Administrator', role: 'Lab Admin',        password: 'Admin@2024' },
          'analyst@casl.lab': { name: 'Ali Al-Qahtani', role: 'Security Analyst', password: 'Analyst@2024' }
        };

        // Allow any password for registered users
        const registered = JSON.parse(localStorage.getItem('casl_registered') || '[]');
        const regUser = registered.find(u => u.email === email && u.password === pass);
        const defUser = users[email];

        let user = null;
        if (regUser) user = regUser;
        else if (defUser && (defUser.password === pass || pass.length >= 6)) user = { name: defUser.name, role: defUser.role, email };

        if (user) {
          localStorage.setItem('casl_user', JSON.stringify({ name: user.name, role: user.role, email }));
          Toast.success('Access Granted', `Welcome back, ${user.name}!`);
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        } else {
          btn.classList.remove('loading');
          btn.disabled = false;
          Toast.error('Access Denied', 'Invalid credentials. Try the demo accounts.');
        }
      }, 1500);
    }

    /* ── Register ── */
    function doRegister() {
      const name  = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const org   = document.getElementById('reg-org').value.trim();
      const pass  = document.getElementById('reg-password').value;
      const conf  = document.getElementById('reg-confirm').value;
      const btn   = document.getElementById('btn-register');

      if (!name || !email || !pass) { Toast.warning('Missing fields', 'Please fill all required fields'); return; }
      if (pass !== conf) { Toast.error('Password mismatch', 'Passwords do not match'); return; }
      if (pass.length < 6) { Toast.warning('Weak password', 'Password must be at least 6 characters'); return; }

      btn.classList.add('loading'); btn.disabled = true;

      setTimeout(() => {
        const registered = JSON.parse(localStorage.getItem('casl_registered') || '[]');
        registered.push({ name, email, org, password: pass, role: 'Student Researcher' });
        localStorage.setItem('casl_registered', JSON.stringify(registered));
        btn.classList.remove('loading'); btn.disabled = false;
        Toast.success('Account Created', `Welcome, ${name}! You can now log in.`);
        switchTab('login');
        document.getElementById('login-email').value = email;
      }, 1200);
    }

    /* Enter key support */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('form-login').classList.contains('active')) doLogin();
        else doRegister();
      }
    });

    /* Redirect if already logged in */
    if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
